<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavelength — Music Player</title>
  <link rel="icon" href="assets/images/default-cover.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===================== LOADER ===================== -->
  <div class="loader" id="loader">
    <div class="loader-disc">
      <div class="loader-disc-hole"></div>
    </div>
    <p class="loader-text">Tuning in<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
  </div>

  <!-- ===================== ANIMATED BACKGROUND ===================== -->
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- ===================== TOAST ===================== -->
  <div class="toast" id="toast"></div>

  <div class="app" id="app">

    <!-- ===================== HEADER ===================== -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </span>
        <h1>Music Player</h1>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search songs or artists..." autocomplete="off" />
      </div>

      <button class="mini-player-toggle" id="miniPlayerToggle" title="Toggle mini player">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="7" height="7" rx="1.5" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- ===================== MAIN LAYOUT ===================== -->
    <main class="main-layout">

      <!-- ============ PLAYER SECTION ============ -->
      <section class="player-panel glass" id="playerPanel">

        <div class="album-wrap">
          <div class="album-glow" id="albumGlow"></div>
          <div class="album-disc" id="albumDisc">
            <img src="assets/images/cover1.jpg" alt="Album cover" id="albumCover" class="album-cover" />
            <div class="disc-hole"></div>
          </div>

          <!-- Visualizer bars -->
          <div class="visualizer" id="visualizer">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="track-info">
          <div class="track-heading">
            <div>
              <h2 class="track-title" id="trackTitle">Neon Skyline</h2>
              <p class="track-artist" id="trackArtist">Midnight Runner</p>
            </div>
            <button class="icon-btn favorite-btn" id="favoriteBtn" title="Add to favorites">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-6.7-4.35-9.3-8.2C.9 9.9 1.9 6.4 5 5.2c2-.78 4 .05 5 1.9 1-1.85 3-2.68 5-1.9 3.1 1.2 4.1 4.7 2.3 7.6C18.7 16.65 12 21 12 21z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <!-- Progress -->
          <div class="progress-section">
            <span class="time current-time" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
              <div class="progress-buffered" id="progressBuffered"></div>
              <div class="progress-filled" id="progressFilled">
                <span class="progress-handle"></span>
              </div>
            </div>
            <span class="time total-duration" id="totalDuration">0:00</span>
          </div>

          <!-- Main Controls -->
          <div class="controls">
            <button class="icon-btn control-btn" id="shuffleBtn" title="Shuffle">
              <svg viewBox="0 0 24 24" fill="none"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <button class="icon-btn control-btn" id="prevBtn" title="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM9.5 12l9-6v12z"/></svg>
            </button>

            <button class="play-btn" id="playBtn" title="Play/Pause">
              <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>

            <button class="icon-btn control-btn" id="nextBtn" title="Next">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l9 6-9 6z"/></svg>
            </button>

            <button class="icon-btn control-btn" id="repeatBtn" title="Repeat">
              <svg viewBox="0 0 24 24" fill="none"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="repeat-one-dot" id="repeatOneDot"></span>
            </button>
          </div>

          <!-- Volume -->
          <div class="volume-section">
            <button class="icon-btn" id="muteBtn" title="Mute">
              <svg id="volIconHigh" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zM16.5 12a4.5 4.5 0 00-2.5-4.03v8.06A4.5 4.5 0 0016.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
              <svg id="volIconMuted" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12L19 9.5 17.5 8 15 10.5 12.5 8 11 9.5l2.5 2.5-2.5 2.5 1.5 1.5 2.5-2.5 2.5 2.5 1.5-1.5z"/></svg>
            </button>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80" />
            <span class="autoplay-toggle-wrap">
              <label class="switch" title="Autoplay next song">
                <input type="checkbox" id="autoplayToggle" checked />
                <span class="switch-track"><span class="switch-thumb"></span></span>
              </label>
              <span class="autoplay-label">Autoplay</span>
            </span>
          </div>
        </div>
      </section>

      <!-- ============ PLAYLIST SECTION ============ -->
      <aside class="playlist-panel glass">
        <div class="playlist-tabs">
          <button class="tab-btn active" data-tab="all">All Songs</button>
          <button class="tab-btn" data-tab="favorites">Favorites</button>
          <button class="tab-btn" data-tab="recent">Recently Played</button>
        </div>

        <ul class="playlist" id="playlist"><!-- injected by JS --></ul>

        <p class="empty-state" id="emptyState" style="display:none">No songs found.</p>
      </aside>

    </main>
  </div>

  <!-- ===================== MINI PLAYER ===================== -->
  <div class="mini-player" id="miniPlayer">
    <img src="assets/images/cover1.jpg" alt="" id="miniCover" class="mini-cover" />
    <div class="mini-info">
      <p class="mini-title" id="miniTitle">Neon Skyline</p>
      <p class="mini-artist" id="miniArtist">Midnight Runner</p>
    </div>
    <button class="icon-btn" id="miniPlayBtn">
      <svg id="miniPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="miniPauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <button class="icon-btn" id="miniNextBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l9 6-9 6z"/></svg>
    </button>
    <button class="icon-btn mini-close" id="miniCloseBtn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script src="script.js"></script>
</body>
</html>
